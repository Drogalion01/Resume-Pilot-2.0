services:
  - type: web
    name: resumepilot-api
    env: python
    region: oregon
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      alembic upgrade head
    startCommand: gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "11520"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: AI_MOCK_MODE
        value: "true"
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: "ResumePilot <noreply@resumepilot.app>"
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_CORS_ORIGINS
        sync: false
      - key: DEBUG
        value: "false"
    healthCheckPath: /api/v1/health
