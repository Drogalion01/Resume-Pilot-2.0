<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Resume Pilot — Land your dream job with AI">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Resume Pilot">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Resume Pilot</title>
  <link rel="manifest" href="manifest.json">

  <!-- ── Paddle.js v2 ─────────────────────────────────────────────────── -->
  <script src="https://cdn.paddle.com/paddle/v2/paddle.js"></script>

  <script>
    // ── OAuth BroadcastChannel relay ─────────────────────────────────────
    try {
      const bc = new BroadcastChannel('flutter-web-auth-2');
      bc.onmessage = (event) => {
        window.postMessage(event.data, '*');
      };
    } catch (e) {
      console.warn("BroadcastChannel not supported", e);
    }

    // ── Paddle.js initialization bridge ──────────────────────────────────
    // Called from Dart via js_interop after fetching the client token
    // from GET /api/v1/subscriptions/config
    window._paddleInitialized = false;

    window.initPaddle = function(clientToken, environment) {
      try {
        Paddle.Initialize({
          token: clientToken,
          environment: environment || 'sandbox',
          eventCallback: function(data) {
            // Relay Paddle events to Flutter via window.postMessage
            window.postMessage({ type: 'paddle_event', event: data.name, data: data.data }, '*');
          }
        });
        window._paddleInitialized = true;
        console.log('[Paddle] Initialized in', environment, 'mode');
      } catch(e) {
        console.error('[Paddle] Initialization failed:', e);
      }
    };

    // Opens the Paddle checkout overlay using a transaction ID
    window.openPaddleCheckout = function(transactionId) {
      if (!window._paddleInitialized) {
        console.error('[Paddle] Not initialized yet');
        return;
      }
      Paddle.Checkout.open({
        transactionId: transactionId,
      });
    };

    // Opens the Paddle checkout overlay using a price ID directly (no backend call)
    window.openPaddleCheckoutByPriceId = function(priceId, userEmail) {
      if (!window._paddleInitialized) {
        console.error('[Paddle] Not initialized yet');
        return;
      }
      Paddle.Checkout.open({
        items: [{ priceId: priceId, quantity: 1 }],
        customer: userEmail ? { email: userEmail } : undefined,
      });
    };
  </script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
