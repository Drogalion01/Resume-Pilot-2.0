name: resume_pilot
description: "AI-powered resume analysis and job application tracking platform."
publish_to: "none"
version: 2.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ── State Management ───────────────────────────────────────────────────────
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5

  # ── Navigation ─────────────────────────────────────────────────────────────
  go_router: ^14.6.2

  # ── HTTP + Cache ───────────────────────────────────────────────────────────
  dio: ^5.7.0
  dio_cache_interceptor: ^3.5.0
  dio_cache_interceptor_hive_store: ^3.2.1

  # ── Auth & Secure Storage ──────────────────────────────────────────────────
  flutter_secure_storage: ^9.2.2
  app_links: ^6.3.2
  flutter_web_auth_2: ^4.0.0
  qr_flutter: ^4.1.0

  # ── Local Storage ──────────────────────────────────────────────────────────
  shared_preferences: ^2.3.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.4

  # ── UI & Design ────────────────────────────────────────────────────────────
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  fl_chart: ^0.69.0
  flutter_animate: ^4.5.0
  flutter_svg: ^2.0.14
  cached_network_image: ^3.4.1

  # ── File Handling ──────────────────────────────────────────────────────────
  file_picker: ^8.1.4

  # ── Code Generation Annotations ────────────────────────────────────────────
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # ── Utilities ──────────────────────────────────────────────────────────────
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.4
  custom_lint: ^0.7.0
  riverpod_lint: ^2.3.13

flutter:
  uses-material-design: true
